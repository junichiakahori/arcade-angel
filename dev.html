<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Arcade Angel - Portable Puppet v0.15.30</title>
    <style>
        body { margin: 0; background: #050515; color: #00F0FF; font-family: 'Outfit', sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #stage { background: #050515; border: 2px solid #00F0FF; box-shadow: 0 0 50px #00F0FF33; border-radius: 12px; }
        .hud { position: absolute; top: 20px; left: 20px; text-shadow: 0 0 10px #00F0FF; z-index: 100; font-size: 14px; background: #101030AA; padding: 15px; border-radius: 8px; border: 1px solid #00F0FF44; pointer-events: none; }
        .settings-panel { position: absolute; top: 20px; right: 20px; z-index: 100; font-size: 11px; background: #050515DD; padding: 15px; border-radius: 8px; border: 1px solid #0088FF88; color: #00F0FF; width: 220px; pointer-events: auto; max-height: 90vh; overflow-y: auto; }
        .control-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; opacity: 0.8; font-weight: bold; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #0088FF; }
        .num-in { background: #050515; border: 1px solid #0088FF88; color: #00F0FF; width: 45px; text-align: center; border-radius: 4px; font-size: 13px; font-family: 'Outfit', sans-serif; }
        .btn { color: #00F0FF; border: 1px solid #00F0FF; padding: 8px 10px; cursor: pointer; background: transparent; display: inline-block; margin-top: 10px; font-size: 11px; width: 100%; box-sizing: border-box; text-align: center; border-radius: 4px; transition: 0.2s; }
        .btn:hover { background: #00F0FF22; }
        .row { display: flex; gap: 5px; }
        .dev-only { display: none; }
    </style>
</head>
<body>
    <script>
        const isDev = window.location.pathname.includes('dev.html');
        if (isDev) {
            document.write('<style>.dev-only { display: block; }</style>');
        }
    </script>
    <div class="hud">
        UNIT: ARCADE_ANGEL v0.15.30 (Updated: 2026-04-17 16:26:00)<br>
        VOICE: <span id="vStatus">OFFLINE</span><br>
        [H] KEY: SMILE TOGGLE
    </div>

    <div class="settings-panel">
        <div class="control-group"><label>EYE POS Y</label><input type="range" id="eyeY" min="-300" max="100" value="-79" oninput="updateState('eyeY', this.value)"></div>
        <div class="control-group"><label>EYE DISTANCE</label><input type="range" id="eyeX" min="30" max="250" value="112" oninput="updateState('eyeX', this.value)"></div>
        <div class="control-group"><label>EYE SIZE</label><input type="range" id="eyeSize" min="0.3" max="1.5" step="0.01" value="0.76" oninput="updateState('eyeSize', this.value)"></div>
        <div class="control-group"><label>MOUTH POS Y</label><input type="range" id="mouthY" min="0" max="300" value="123" oninput="updateState('mouthY', this.value)"></div>
        
        <div class="control-group"><label style="color:#FF00FF">THRES A (Wide)</label><div class="row"><input type="range" id="thresA" min="0" max="80" value="22"><input type="number" id="thresA_num" class="num-in"></div></div>
        <div class="control-group"><label style="color:#FF00FF">THRES E (Mid)</label><div class="row"><input type="range" id="thresE" min="0" max="80" value="15"><input type="number" id="thresE_num" class="num-in"></div></div>
        <div class="control-group"><label style="color:#FF00FF">THRES I (Narrow)</label><div class="row"><input type="range" id="thresI" min="0" max="80" value="10"><input type="number" id="thresI_num" class="num-in"></div></div>
        <div class="control-group"><label style="color:#FF00FF">THRES O (Med-Round)</label><div class="row"><input type="range" id="thresO" min="0" max="80" value="6"><input type="number" id="thresO_num" class="num-in"></div></div>
        <div class="control-group"><label style="color:#FF00FF">THRES U (Small-Round)</label><div class="row"><input type="range" id="thresU" min="0" max="80" value="2"><input type="number" id="thresU_num" class="num-in"></div></div>

        
        <div id="smileBtn" class="btn" onclick="toggleSmile()">MODE: SMILE</div>
        <div class="row">
            <div class="btn" onclick="exportProfile()">EXPORT</div>
            <div class="btn" onclick="importProfile()">IMPORT</div>
        </div>
        <div class="btn" style="border-color: #FF5555; color: #FF5555; margin-top: 5px;" onclick="resetState()">RESET DEFAULTS</div>
        <div class="dev-only">
            <div class="label">COSTUME</div>
            <div class="row" style="margin-bottom:10px;">
                <div class="btn" onclick="setCostume('none')">NONE</div>
                <div class="btn" onclick="setCostume('cyber')">CYBER</div>
                <div class="btn" onclick="setCostume('gothic')">GOTHIC</div>
            </div>
            <div id="startBtn" class="btn" onclick="initVoice()">ENABLE VOICE</div>
        </div>
        <div class="btn" style="background: #ffffff11; color: #888; font-size: 10px; margin-top: 10px;" onclick="switchVersion()">SWITCH TO PROD/DEV VERSION</div>
    </div>

    <canvas id="stage" width="800" height="800"></canvas>
    <video id="webcam" autoplay playsinline style="display:none"></video>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        const state = {
            curX: 0, curY: 0, curRot: 0, tgtX: 0, tgtY: 0, tgtRot: 0,
            eyeL: 1, eyeR: 1, mouthOpen: 0, voiceVol: 0,
            eyeX: 112, eyeY: -79, eyeSize: 0.76, mouthY: 123, globalScale: 0.75,
            isHappy: true, skinTone: 0, costume: 'none', isVoiceReady: false, thresA: 0.22, thresE: 0.15, thresI: 0.10, thresO: 0.06, thresU: 0.02
        };

        const images = {};
        let audioCtx, analyser, dataArray;

        function updateState(k, v) { state[k] = parseFloat(v); syncUI(k, v); }
        
        
        function applyProfile(p) {
            for (let k in p) {
                if (state.hasOwnProperty(k)) {
                    state[k] = p[k];
                    const el = document.getElementById(k);
                    if (el) el.value = p[k];
                }
            }
        }

        function exportProfile() {
            const p = { eyeX: state.eyeX, eyeY: state.eyeY, eyeSize: state.eyeSize, mouthY: state.mouthY, skinTone: state.skinTone };
            navigator.clipboard.writeText(JSON.stringify(p));
            alert("PROFILE COPIED");
        }

        function importProfile() {
            const text = prompt("PASTE CODE:");
            if (text) { try { applyProfile(JSON.parse(text)); saveToLocal(); } catch(e) { alert("FAIL"); } }
        }

        function setCostume(c) { state.costume = c; saveToLocal(); }
        function switchVersion() {
            const isDev = window.location.pathname.endsWith('dev.html');
            window.location.href = isDev ? 'index.html' : 'dev.html';
        }
        function resetState() {
            const defaults = { eyeX: 112, eyeY: -79, eyeSize: 0.76, mouthY: 123, skinTone: 0 };
            if (confirm("Reset to default settings?")) {
                applyProfile(defaults);
                saveToLocal();
            }
        }

        function toggleSmile() {
            state.isHappy = !state.isHappy;
            document.getElementById('smileBtn').innerText = state.isHappy ? "MODE: SMILE" : "MODE: NORMAL";
            saveToLocal();
        }
        window.addEventListener('keydown', (e) => { if (e.key.toLowerCase() === 'h') toggleSmile(); });

        async function initVoice() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaStreamSource(stream);
            analyser = audioCtx.createAnalyser(); analyser.fftSize = 256;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            source.connect(analyser); state.isVoiceReady = true;
            document.getElementById('vStatus').innerText = "LIVE";
            document.getElementById('startBtn').style.display = "none";
        }

        async function processAlpha(img, type) {
            const canvas = document.createElement('canvas');
            canvas.width = img.width; canvas.height = img.height;
            const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0);
            const data = ctx.getImageData(0, 0, img.width, img.height);
            for (let i = 0; i < data.data.length; i += 4) {
                const r = data.data[i], g = data.data[i+1], b = data.data[i+2];
                if (type === 'face') {
                    if (g > 100 && g > r + 60 && g > b + 60) data.data[i+3] = 0;
                } else {
                    if (r > 220 && g > 220 && b > 220) data.data[i+3] = 0;
                }
            }
            ctx.putImageData(data, 0, 0);
            const r = new Image(); r.src = canvas.toDataURL();
            return new Promise(res => r.onload = () => res(r));
        }

        function drawPart(img, options = {}) {
            if (!img || !img.complete) return;
            const ctx = document.getElementById('stage').getContext('2d');
            const gs = state.globalScale;
            let sw, sh, sx, sy;

            if (options.isEyes) {
                sw = 210; sh = 165;
                sx = (options.frame % 4) * 256 + 23;
                sy = Math.floor(options.frame / 4) * 256 + 45;
            } else if (options.isMouth) {
                const cellW = img.width / 3;
                const cellH = img.height / 3;
                sw = 210; sh = 120;
                sx = (options.frame % 3) * cellW + (cellW - sw)/2;
                sy = Math.floor(options.frame / 3) * cellH + (cellH - sh)/2;
            } else {
                sw = img.width; sh = img.height; sx = 0; sy = 0;
            }

            
            ctx.save();
            let hX = state.curX * gs * 0.8;
            let hY = state.curY * gs * 0.8;
            ctx.translate(400 + hX, 400 + hY + 450 * gs); 
            ctx.rotate(state.curRot);
            ctx.translate((options.x || 0) * gs, ((options.y || 0) - 450) * gs);
            const flip = options.flip ? -1 : 1;
            ctx.scale((options.scaleX || 1) * gs * flip, (options.scaleY || 1) * gs);

            
            if (options.isFace && state.skinTone > 0) {
                const offC = document.createElement('canvas'); offC.width = sw; offC.height = sh;
                const octx = offC.getContext('2d'); octx.drawImage(img, sx, sy, sw, sh, 0, 0, sw, sh);
                octx.globalCompositeOperation = 'multiply'; octx.fillStyle = `rgba(255, 175, 145, ${state.skinTone})`; 
                octx.fillRect(0, 0, sw, sh); octx.globalCompositeOperation = 'destination-in';
                octx.drawImage(img, sx, sy, sw, sh, 0, 0, sw, sh); ctx.drawImage(offC, -sw/2, -sh/2);
            } else {
                ctx.drawImage(img, sx, sy, sw, sh, -sw/2, -sh/2, sw, sh);
            }
            ctx.restore();
        }

        function render() {
            const ctx = document.getElementById('stage').getContext('2d');
            ctx.clearRect(0, 0, 800, 800);
            if (state.isVoiceReady) {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0; for (let r = 0; r < dataArray.length; r++) sum += dataArray[r];
                state.voiceVol = (sum / dataArray.length) / 50;
            }
            const bImg = state.costume === 'standard' ? images.body_standard : (state.costume === 'cyber' ? images.body_cyber : (state.costume === 'gothic' ? images.body_gothic : null));
            if (bImg) {
                ctx.save();
                ctx.translate(400 + state.curX * state.globalScale * 0.3, 400 + state.curY * state.globalScale * 0.3 + 300 * state.globalScale);
                ctx.scale(state.globalScale * 1.2, state.globalScale * 1.2);
                ctx.drawImage(bImg, -bImg.width/2, -bImg.height/2);
                ctx.restore();
            }
            drawPart(images.face, { isFace: true });
            
            
            const getEyeFrame = (openness, happy) => {
                if (happy) {
                    if (openness > 0.8) return 4; // Smile Open
                    if (openness > 0.5) return 5; // Smile Mid
                    if (openness > 0.2) return 6; // Smile Narrow
                    return 15; // Fully Closed
                } else {
                    if (openness > 0.8) return 0; // Open
                    if (openness > 0.6) return 1; // Slight Close
                    if (openness > 0.4) return 2; // Mid Close
                    if (openness > 0.2) return 3; // Narrow
                    return 15; // Fully Closed
                }
            };
            let eyeFrameL = getEyeFrame(state.eyeL, state.isHappy);
            let eyeFrameR = getEyeFrame(state.eyeR, state.isHappy);
    
            const ew = state.eyeSize;
            drawPart(images.eyeUni, { x: -state.eyeX, y: state.eyeY, scaleX:ew, scaleY:ew, frame: eyeFrameL, isEyes: true, flip: true });
            drawPart(images.eyeUni, { x: state.eyeX, y: state.eyeY, scaleX:ew, scaleY:ew, frame: eyeFrameR, isEyes: true, flip: false });
            
            
            
            let v = Math.max(state.mouthOpen, state.voiceVol);
            let mf = 0, det = "CLOSED", ms = state.isHappy ? 0.48 : 0.45;
            if (v >= state.thresA) { mf = 7; det = "A"; ms *= 0.82; }
            else if (v >= state.thresE) { mf = 1; det = "E"; }
            else if (v >= state.thresI) { mf = 4; det = "I"; }
            else if (v >= state.thresO) { mf = 6; det = "O"; }
            else if (v >= state.thresU) { mf = 6; det = "U"; ms *= 0.5; }
            else { mf = state.isHappy ? 3 : 0; det = "CLOSED"; }
            drawPart(images.mouthUni, { y: state.mouthY, scaleX:ms, scaleY:ms, frame: mf, isMouth: true });

            // --- DIAGNOSTIC HUD UPDATE (v0.15.30) ---
            const hud = document.querySelector('.hud');
            if (hud && v_data) {
                let v_val = state.voiceVol.toFixed(2);
                let r_val = state.mouthOpen.toFixed(2);
                hud.innerHTML = `UNIT: ARCADE_ANGEL ${v_data.current_version} (Updated: ${v_data.last_updated})<br>` +
                              `VOICE: <span id="vStatus">${state.isVoiceReady ? 'LIVE' : 'OFFLINE'}</span><br>` +
                              `<span style="color:#00F0FF">V: ${v_val} / RATIO: ${r_val}</span><br>` +
                              `<span style="color:#FF00FF">DETECTED: ${state.detectedVowel || 'NONE'}</span><br>` +
                              `[H] KEY: SMILE TOGGLE`;
            }

        }

        function animate() {
            state.curX += (state.tgtX - state.curX) * 0.1; state.curY += (state.tgtY - state.curY) * 0.1;
            state.curRot += (state.tgtRot - state.curRot) * 0.08; render(); requestAnimationFrame(animate);
        }


        (async function init() {
            try {
                const response = await fetch('assets.json?v=' + Date.now());
                const assets = await response.json();
                // [CLEAN HUD] Dynamic Version Display
                fetch('version_history_dev.json?v=' + Date.now())
                    .then(r => r.json())
                    .then(v_data => {
                        const hud = document.querySelector('.hud');
                        if (hud) {
                            hud.innerHTML = `UNIT: ARCADE_ANGEL ${v_data.current_version} (Updated: ${v_data.last_updated})<br>` +
                                          `VOICE: <span id="vStatus">OFFLINE</span><br>` +
                                          `[H] KEY: SMILE TOGGLE`;
                        }
                    });
                
                
                // Initialize MediaPipe FaceMesh
                const fm = new FaceMesh({ 
                    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` 
                });
                
                fm.setOptions({
                    maxNumFaces: 1,
                    refineLandmarks: true,
                    minDetectionConfidence: 0.8,
                    minTrackingConfidence: 0.8
                });

                fm.onResults((res) => {
                    if (res.multiFaceLandmarks && res.multiFaceLandmarks[0]) {
                        const lm = res.multiFaceLandmarks[0];
                        
                        const valL = Math.abs(lm[159].y - lm[145].y);
                        const valR = Math.abs(lm[386].y - lm[374].y);
                        // Sensivity fix: 0.006 (closed) to 0.022 (open)
                        // Mirror fix: map Person-Left (valL) to Puppet-Right, and Person-Right (valR) to Puppet-Left
                        state.eyeL = Math.max(0, Math.min(1, (valR - 0.006) / 0.016));
                        state.eyeR = Math.max(0, Math.min(1, (valL - 0.006) / 0.016));
                        state.mouthOpen = Math.abs(lm[13].y - lm[14].y) * 5;
                        
                        state.tgtX = (lm[1].x - 0.5) * 400;
                        state.tgtY = (lm[1].y - 0.5) * 400;
                        state.tgtRot = Math.atan2(lm[152].x - lm[10].x, lm[152].y - lm[10].y) * -1;
                    }
                });

                const webcamElement = document.getElementById('webcam');
                const cam = new Camera(webcamElement, {
                    onFrame: async () => {
                        await fm.send({ image: webcamElement });
                    },
                    width: 640,
                    height: 480
                });
                cam.start();

                // Load assets from JSON and process alpha
                for (let k in assets) {
                    const img = await new Promise(resolve => {
                        const i = new Image();
                        i.onload = () => resolve(i);
                        i.src = assets[k];
                    });
                    images[k] = await processAlpha(img, k === 'face' ? 'face' : 'part');
                }

                // Start the animation loop once assets are ready
                animate();
                
            } catch (error) {
                console.error("Initialization failed:", error);
            }
        
        // --- ADVANCED UI BINDING (v0.15.30) ---
        function syncUI(key, val) {
            state[key] = parseFloat(val);
            if (key.startsWith('thres')) state[key] /= 100;
            const sl = document.getElementById(key); if (sl) sl.value = val;
            const nm = document.getElementById(key + '_num'); if (nm) nm.value = val;
            saveToLocal();
        }
        
        ['thresA', 'thresE', 'thresI', 'thresO', 'thresU'].forEach(k => {
            const sl = document.getElementById(k);
            const nm = document.getElementById(k + '_num');
            if (sl) sl.oninput = (e) => syncUI(k, e.target.value);
            if (nm) nm.oninput = (e) => syncUI(k, e.target.value);
            // Init display
            const initVal = state[k] * 100;
            if (sl) sl.value = initVal;
            if (nm) nm.value = initVal;
        });

        function saveToLocal() {
            const p = { 
                eyeX: state.eyeX, eyeY: state.eyeY, eyeSize: state.eyeSize, mouthY: state.mouthY, skinTone: state.skinTone,
                thresA: state.thresA, thresE: state.thresE, thresI: state.thresI, thresO: state.thresO, thresU: state.thresU
            };
            localStorage.setItem('arcade_angel_dev_profile', JSON.stringify(p));
        }
        function loadFromLocal() {
            const raw = localStorage.getItem('arcade_angel_dev_profile');
            if (raw) {
                const p = JSON.parse(raw);
                Object.assign(state, p);
                Object.keys(p).forEach(k => {
                    const el = document.getElementById(k); if (el) el.value = k.startsWith('thres') ? p[k]*100 : p[k];
                    const nm = document.getElementById(k + '_num'); if (nm) nm.value = k.startsWith('thres') ? p[k]*100 : p[k];
                });
            }
        }
        loadFromLocal();
})();
    </script>
</body>
</html>
