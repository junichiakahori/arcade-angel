        function syncUI(key, val) {
            if (key.startsWith('thres')) state[key] = parseFloat(val) / 100; else state[key] = parseFloat(val);
            const sl = document.getElementById(key); if (sl) sl.value = val;
            const nm = document.getElementById(key + '_num'); if (nm) nm.value = val;
            saveToLocal();
        }
        function toggleSmile() { state.isHappy = !state.isHappy; document.getElementById('smileBtn').innerText = state.isHappy ? "MODE: SMILE" : "MODE: NORMAL"; saveToLocal(); }
        window.addEventListener('keydown', (e) => { if (e.key.toLowerCase() === 'h') toggleSmile(); });

        async function initVoice() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaStreamSource(stream);
            analyser = audioCtx.createAnalyser(); analyser.fftSize = 256;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            source.connect(analyser); state.isVoiceReady = true;
            document.getElementById('startBtn').style.display = "none";
        }

        async function processAlpha(img, type) {
            const canvas = document.createElement('canvas'); canvas.width = img.width; canvas.height = img.height;
            const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0);
            const data = ctx.getImageData(0, 0, img.width, img.height);
            for (let i = 0; i < data.data.length; i += 4) {
                const r = data.data[i], g = data.data[i+1], b = data.data[i+2];
                if (type === 'face' ? (g > 100 && g > r + 60 && g > b + 60) : (r > 220 && g > 220 && b > 220)) data.data[i+3] = 0;
            }
            ctx.putImageData(data, 0, 0);
            const r = new Image(); r.src = canvas.toDataURL();
            return new Promise(res => r.onload = () => res(r));
        }

        function drawPart(img, options = {}) {
            if (!img || !img.complete) return;
            const ctx = document.getElementById('stage').getContext('2d');
            const gs = state.globalScale;
            let sw = img.width, sh = img.height, sx = 0, sy = 0;
            if (options.isEyes) { sw = 210; sh = 165; sx = (options.frame % 4) * 256 + 23; sy = Math.floor(options.frame / 4) * 256 + 45; }
            else if (options.isMouth) { sw = 210; sh = 120; sx = (options.frame % 3) * (img.width/3) + (img.width/3-sw)/2; sy = Math.floor(options.frame/3)*(img.height/3)+(img.height/3-sh)/2; }

            ctx.save();
            let pY = state.pivotY || 600;
            let hX = state.curX * gs * 0.15, hY = state.curY * gs * 0.15;
            let smoothRot = state.curRot * 0.8;
            ctx.translate(400 + hX, 400 + hY + pY * gs); 
            ctx.rotate(smoothRot);
            ctx.translate((options.x || 0) * gs, ((options.y || 0) - pY) * gs);
            ctx.scale((options.scaleX || 1) * gs * (options.flip ? -1 : 1), (options.scaleY || 1) * gs);
            ctx.drawImage(img, sx, sy, sw, sh, -sw/2, -sh/2, sw, sh);
            ctx.restore();
        }

        function render() {
            const ctx = document.getElementById('stage').getContext('2d');
            ctx.clearRect(0, 0, 800, 800);
            if (state.isVoiceReady) {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0; for (let r = 0; r < dataArray.length; r++) sum += dataArray[r];
                state.voiceVol = (sum / dataArray.length) / 50;
            }
            
            const bImg = state.costume === 'cyber' ? images.body_cyber : (state.costume === 'gothic' ? images.body_gothic : images.body_standard);
            if (bImg) {
                ctx.save();
                ctx.translate(400 + state.curX * state.globalScale * 0.3, 400 + state.curY * state.globalScale * 0.3 + 300 * state.globalScale);
                ctx.scale(state.globalScale * 1.2, state.globalScale * 1.2);
                ctx.drawImage(bImg, -bImg.width/2, -bImg.height/2);
                ctx.restore();
            }
            
            drawPart(images.face, { isFace: true });

            
            // --- ELEGANT SYNCED SMILE (v0.15.59) ---
            const shouldShowHappyEyes = state.isHappy || (state.autoSmile && state.smileDegree > 0.5);
            
            if (shouldShowHappyEyes && images.eyeHappyL.complete && images.eyeHappyR.complete) {
                const gs = state.globalScale;
                const pY = state.pivotY || 600;
                const bx = state.curX * gs * 0.15;
                const by = state.curY * gs * 0.15;
                const rot = state.curRot * 0.8;

                ctx.save();
                ctx.globalAlpha = 0.9; // Soften the harsh black
                
                // Left Happy Eye (Smaller and Lower)
                ctx.save();
                ctx.translate(400 + bx, 400 + by + pY * gs);
                ctx.rotate(rot);
                ctx.translate(-state.eyeX * gs, (state.eyeY - pY + 15) * gs); // +15 to lower it
                ctx.scale(state.eyeSize * gs * 0.65, state.eyeSize * gs * 0.65); // 0.65x smaller
                ctx.drawImage(images.eyeHappyL, -images.eyeHappyL.width/2, -images.eyeHappyL.height/2);
                ctx.restore();

                // Right Happy Eye (Smaller and Lower)
                ctx.save();
                ctx.translate(400 + bx, 400 + by + pY * gs);
                ctx.rotate(rot);
                ctx.translate(state.eyeX * gs, (state.eyeY - pY + 15) * gs); // +15 to lower it
                ctx.scale(state.eyeSize * gs * 0.65, state.eyeSize * gs * 0.65); // 0.65x smaller
                ctx.drawImage(images.eyeHappyR, -images.eyeHappyR.width/2, -images.eyeHappyR.height/2);
                ctx.restore();
                
                ctx.restore();
            } else {

                const getEyeFrame = (o) => (o > 0.8 ? 0 : o > 0.6 ? 1 : o > 0.4 ? 2 : o > 0.2 ? 3 : 15);
                drawPart(images.eyeUni, { x: -state.eyeX, y: state.eyeY, scaleX:state.eyeSize, scaleY:state.eyeSize, frame: getEyeFrame(state.eyeL), isEyes: true, flip: true });
                drawPart(images.eyeUni, { x: state.eyeX, y: state.eyeY, scaleX:state.eyeSize, scaleY:state.eyeSize, frame: getEyeFrame(state.eyeR), isEyes: true });
            }

            let v = Math.max(state.mouthOpen, state.voiceVol);
            let mf = 0, det = "CLOSED", ms = shouldShowHappyEyes ? (0.43 + state.smileDegree * 0.04) : 0.41;
            if (v >= state.thresA) { mf = 7; det = "A"; ms *= 0.82; }
            else if (v >= state.thresE) { mf = 1; det = "E"; }
            else if (v >= state.thresI) { mf = 4; det = "I"; }
            else if (v >= state.thresO) { mf = 6; det = "O"; }
            else if (v >= state.thresU) { mf = 6; det = "U"; ms *= 0.5; }
            else { mf = shouldShowHappyEyes ? 3 : 0; det = "CLOSED"; }
            state.detectedVowel = det;
            drawPart(images.mouthUni, { y: state.mouthY, scaleX:ms, scaleY:ms, frame: mf, isMouth: true });

            const hud = document.querySelector('.hud');
            if (hud && v_data) {
                hud.innerHTML = `UNIT: ARCADE_ANGEL ${v_data.current_version} (${v_data.last_updated})<br>` +
                              `SMILE: <span style="color:#FFAA00">${Math.round(state.smileDegree*100)}%</span> (SENS:${(state.smileSens/100).toFixed(2)})<br>` +
                              `EYES: ${shouldShowHappyEyes ? '<span style="color:#FF00FF">HAPPY</span>' : 'NORMAL'}`;
            }
        }

        function animate() {
            state.curX += (state.tgtX - state.curX) * 0.1; state.curY += (state.tgtY - state.curY) * 0.1;
            state.curRot += (state.tgtRot - state.curRot) * 0.06; render(); requestAnimationFrame(animate);
        }

        (async function init() {
            try {
                const assets = await (await fetch('assets.json?v=' + Date.now())).json();
                v_data = await (await fetch('version_history_dev.json?v=' + Date.now())).json();
                const fm = new FaceMesh({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
                fm.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });
                fm.onResults((res) => {
                    if (res.multiFaceLandmarks && res.multiFaceLandmarks[0]) {
                        const lm = res.multiFaceLandmarks[0];
                        state.eyeL = Math.max(0, Math.min(1, (Math.abs(lm[386].y - lm[374].y) - 0.006) / 0.016));
                        state.eyeR = Math.max(0, Math.min(1, (Math.abs(lm[159].y - lm[145].y) - 0.006) / 0.016));
                        state.mouthOpen = Math.abs(lm[13].y - lm[14].y) * 5;
                        state.tgtX = (lm[1].x - 0.5) * 400; state.tgtY = (lm[1].y - 0.5) * 400;
                        state.tgtRot = Math.atan2(lm[152].x - lm[10].x, lm[152].y - lm[10].y) * -1;
                        const mouthWidth = Math.abs(lm[61].x - lm[291].x);
                        const eyeDist = Math.abs(lm[33].x - lm[263].x);
                        state.smileRaw = mouthWidth / eyeDist;
                        state.smileDegree = Math.max(0, Math.min(1, (state.smileRaw - (state.smileSens/100)) / 0.2));
                        if (state.autoSmile) state.isHappy = state.smileDegree > 0.5;
                    }
                });
                const cam = new Camera(document.getElementById('webcam'), { onFrame: async () => await fm.send({ image: document.getElementById('webcam') }), width: 640, height: 480 });
                cam.start();
                for (let k in assets) {
                    const i = new Image(); i.src = assets[k];
                    await new Promise(r => i.onload = r);
                    images[k] = await processAlpha(i, k === 'face' ? 'face' : 'part');
                }
                loadFromLocal();
                ['thresA','thresE','thresI','thresO','thresU','pivotY','smileSens'].forEach(k => {
                    const s = document.getElementById(k), n = document.getElementById(k + '_num');
                    if (s) s.oninput = (e) => syncUI(k, e.target.value);
                    if (n) n.oninput = (e) => syncUI(k, e.target.value);
                    const v = k.startsWith('thres') ? state[k]*100 : state[k];
                    if (s) s.value = v; if (n) n.value = v;
                });
                animate();
            } catch (e) { console.error(e); }
        })( );
    </script>
</body>
