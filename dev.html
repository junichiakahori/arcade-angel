<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Arcade Angel - Portable Puppet v0.15.52</title>
    <style>
        body { margin: 0; background: #050515; color: #00F0FF; font-family: 'Outfit', sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #stage { background: #050515; border: 2px solid #00F0FF; box-shadow: 0 0 50px #00F0FF33; border-radius: 12px; }
        .hud { position: absolute; top: 20px; left: 20px; text-shadow: 0 0 10px #00F0FF; z-index: 100; font-size: 14px; background: #101030AA; padding: 15px; border-radius: 8px; border: 1px solid #00F0FF44; pointer-events: none; }
        .settings-panel { position: absolute; top: 20px; right: 20px; z-index: 100; font-size: 11px; background: #050515DD; padding: 15px; border-radius: 8px; border: 1px solid #0088FF88; color: #00F0FF; width: 220px; pointer-events: auto; max-height: 90vh; overflow-y: auto; }
        .control-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; opacity: 0.8; font-weight: bold; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #0088FF; }
        .num-in { background: #050515; border: 1px solid #0088FF88; color: #00F0FF; width: 45px; text-align: center; border-radius: 4px; font-size: 13px; font-family: 'Outfit', sans-serif; }
        .btn { color: #00F0FF; border: 1px solid #00F0FF; padding: 8px 10px; cursor: pointer; background: transparent; display: inline-block; margin-top: 10px; font-size: 11px; width: 100%; box-sizing: border-box; text-align: center; border-radius: 4px; transition: 0.2s; }
        .btn:hover { background: #00F0FF22; }
        .row { display: flex; gap: 5px; }
        .dev-only { display: none; }
    </style>
</head>
<body>
    <script>
        const isDev = window.location.pathname.includes('dev.html');
        if (isDev) {
            document.write('<style>.dev-only { display: block; }</style>');
        }
    </script>
    <div class="hud">UNIT: ARCADE_ANGEL v0.15.52 (Loading...)</div>

    <div class="settings-panel">
        <div class="control-group"><label>EYE POS Y</label><input type="range" id="eyeY" min="-300" max="100" value="-79" oninput="updateState('eyeY', this.value)"></div>
        <div class="control-group"><label>EYE DISTANCE</label><input type="range" id="eyeX" min="30" max="250" value="112" oninput="updateState('eyeX', this.value)"></div>
        <div class="control-group"><label>EYE SIZE</label><input type="range" id="eyeSize" min="0.3" max="1.5" step="0.01" value="0.76" oninput="updateState('eyeSize', this.value)"></div>
        <div class="control-group"><label>MOUTH POS Y</label><input type="range" id="mouthY" min="0" max="300" value="123" oninput="updateState('mouthY', this.value)"></div>
        <div class="control-group"><label style="color:#FFAA00">SMILE SENS (Auto-Happy)</label><div class="row"><input type="range" id="smileSens" min="50" max="100" value="70"><input type="number" id="smileSens_num" class="num-in"></div></div>
        <div class="control-group"><label style="color:#00FF88">ROT PIVOT Y (Depth)</label><div class="row"><input type="range" id="pivotY" min="0" max="600" value="600"><input type="number" id="pivotY_num" class="num-in"></div></div>
        <div class="control-group"><label style="color:#FF00FF">THRES A (Wide)</label><div class="row"><input type="range" id="thresA" min="0" max="80" value="27"><input type="number" id="thresA_num" class="num-in" value="27"></div></div>
        <div class="control-group"><label style="color:#FF00FF">THRES E (Mid)</label><div class="row"><input type="range" id="thresE" min="0" max="80" value="18"><input type="number" id="thresE_num" class="num-in" value="18"></div></div>
        <div class="control-group"><label style="color:#FF00FF">THRES I (Narrow)</label><div class="row"><input type="range" id="thresI" min="0" max="80" value="14"><input type="number" id="thresI_num" class="num-in" value="14"></div></div>
        <div class="control-group"><label style="color:#FF00FF">THRES O (Med-Round)</label><div class="row"><input type="range" id="thresO" min="0" max="80" value="5"><input type="number" id="thresO_num" class="num-in" value="5"></div></div>
        <div class="control-group"><label style="color:#FF00FF">THRES U (Small-Round)</label><div class="row"><input type="range" id="thresU" min="0" max="80" value="1"><input type="number" id="thresU_num" class="num-in" value="1"></div></div>
        <div id="smileBtn" class="btn" onclick="toggleSmile()">MODE: SMILE</div>
        <div class="row">
            <div class="btn" onclick="exportProfile()">EXPORT</div>
            <div class="btn" onclick="importProfile()">IMPORT</div>
        </div>
        <div class="btn" style="border-color: #FF5555; color: #FF5555" onclick="resetState()">RESET DEFAULTS</div>
        <div class="dev-only">
            <div class="btn" onclick="setCostume('none')">COSTUME: NONE</div>
            <div class="btn" onclick="setCostume('cyber')">COSTUME: CYBER</div>
            <div class="btn" onclick="setCostume('gothic')">COSTUME: GOTHIC</div>
            <div id="startBtn" class="btn" onclick="initVoice()">ENABLE VOICE</div>
        </div>
        <div class="btn" style="background: #ffffff11; color: #888; font-size: 10px" onclick="switchVersion()">SWITCH VERSION</div>
    </div>

    <canvas id="stage" width="800" height="800"></canvas>
    <video id="webcam" autoplay playsinline style="display:none"></video>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        const state = {
            curX: 0, curY: 0, curRot: 0, tgtX: 0, tgtY: 0, tgtRot: 0,
            eyeL: 1, eyeR: 1, mouthOpen: 0, voiceVol: 0,
            eyeX: 112, eyeY: -79, eyeSize: 0.76, mouthY: 123, globalScale: 0.78,
            isHappy: true, skinTone: 0, costume: 'none', isVoiceReady: false, 
            thresA: 0.27, thresE: 0.18, thresI: 0.14, thresO: 0.05, thresU: 0.01, 
            pivotY: 600, smileSens: 70, smileDegree: 0, smileRaw: 0, autoSmile: true
        };
        const images = {};
        let audioCtx, analyser, dataArray, v_data;

        function updateState(k, v) { state[k] = parseFloat(v); syncUI(k, v); }
        function saveToLocal() {
            const p = {};
            ['eyeX','eyeY','eyeSize','mouthY','skinTone','thresA','thresE','thresI','thresO','thresU','pivotY','smileSens'].forEach(k => p[k] = state[k]);
            localStorage.setItem('arcade_angel_dev_profile', JSON.stringify(p));
        }
        function loadFromLocal() {
            const raw = localStorage.getItem('arcade_angel_dev_profile');
            if (raw) {
                const p = JSON.parse(raw);
                Object.assign(state, p);
                Object.keys(p).forEach(k => {
                    const el = document.getElementById(k); if (el) el.value = k.startsWith('thres') ? p[k]*100 : p[k];
                    const nm = document.getElementById(k + '_num'); if (nm) nm.value = k.startsWith('thres') ? p[k]*100 : p[k];
                });
            }
        }
        function syncUI(key, val) {
            if (key.startsWith('thres')) state[key] = parseFloat(val) / 100; else state[key] = parseFloat(val);
            const sl = document.getElementById(key); if (sl) sl.value = val;
            const nm = document.getElementById(key + '_num'); if (nm) nm.value = val;
            saveToLocal();
        }

        function toggleSmile() { state.isHappy = !state.isHappy; document.getElementById('smileBtn').innerText = state.isHappy ? "MODE: SMILE" : "MODE: NORMAL"; saveToLocal(); }
        window.addEventListener('keydown', (e) => { if (e.key.toLowerCase() === 'h') toggleSmile(); });

        async function initVoice() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaStreamSource(stream);
            analyser = audioCtx.createAnalyser(); analyser.fftSize = 256;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            source.connect(analyser); state.isVoiceReady = true;
            document.getElementById('startBtn').style.display = "none";
        }

        async function processAlpha(img, type) {
            const canvas = document.createElement('canvas'); canvas.width = img.width; canvas.height = img.height;
            const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0);
            const data = ctx.getImageData(0, 0, img.width, img.height);
            for (let i = 0; i < data.data.length; i += 4) {
                const r = data.data[i], g = data.data[i+1], b = data.data[i+2];
                if (type === 'face' ? (g > 100 && g > r + 60 && g > b + 60) : (r > 220 && g > 220 && b > 220)) data.data[i+3] = 0;
            }
            ctx.putImageData(data, 0, 0);
            const r = new Image(); r.src = canvas.toDataURL();
            return new Promise(res => r.onload = () => res(r));
        }

        function drawPart(img, options = {}) {
            if (!img || !img.complete) return;
            const ctx = document.getElementById('stage').getContext('2d');
            const gs = state.globalScale;
            let sw = img.width, sh = img.height, sx = 0, sy = 0;
            if (options.isEyes) { sw = 210; sh = 165; sx = (options.frame % 4) * 256 + 23; sy = Math.floor(options.frame / 4) * 256 + 45; }
            else if (options.isMouth) { sw = 210; sh = 120; sx = (options.frame % 3) * (img.width/3) + (img.width/3-sw)/2; sy = Math.floor(options.frame/3)*(img.height/3)+(img.height/3-sh)/2; }

            ctx.save();
            let pY = state.pivotY || 500;
            let hX = state.curX * gs * 0.15, hY = state.curY * gs * 0.15;
            let smoothRot = state.curRot * 0.8;
            ctx.translate(400 + hX, 400 + hY + pY * gs); 
            ctx.rotate(smoothRot);
            ctx.translate((options.x || 0) * gs, ((options.y || 0) - pY) * gs);
            ctx.scale((options.scaleX || 1) * gs * (options.flip ? -1 : 1), (options.scaleY || 1) * gs);
            ctx.drawImage(img, sx, sy, sw, sh, -sw/2, -sh/2, sw, sh);
            ctx.restore();
        }

        function render() {
            const ctx = document.getElementById('stage').getContext('2d');
            ctx.clearRect(0, 0, 800, 800);
            if (state.isVoiceReady) {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0; for (let r = 0; r < dataArray.length; r++) sum += dataArray[r];
                state.voiceVol = (sum / dataArray.length) / 50;
            }
            const bImg = state.costume === 'cyber' ? images.body_cyber : (state.costume === 'gothic' ? images.body_gothic : images.body_standard);
            if (bImg) {
                ctx.save();
                ctx.translate(400 + state.curX * state.globalScale * 0.3, 400 + state.curY * state.globalScale * 0.3 + 300 * state.globalScale);
                ctx.scale(state.globalScale * 1.2, state.globalScale * 1.2);
                ctx.drawImage(bImg, -bImg.width/2, -bImg.height/2);
                ctx.restore();
            }
            drawPart(images.face, { isFace: true });
            const getEyeFrame = (o, h) => h ? (o>0.3?6:15) : (o>0.8?0:o>0.6?1:o>0.4?2:o>0.2?3:15);
            drawPart(images.eyeUni, { x: -state.eyeX, y: state.eyeY, scaleX:state.eyeSize, scaleY:state.eyeSize * (state.isHappy ? 0.55 : 1.0), frame: getEyeFrame(state.eyeL, state.isHappy), isEyes: true, flip: true });
            drawPart(images.eyeUni, { x: state.eyeX, y: state.eyeY, scaleX:state.eyeSize, scaleY:state.eyeSize * (state.isHappy ? 0.55 : 1.0), frame: getEyeFrame(state.eyeR, state.isHappy), isEyes: true });
            
            let v = Math.max(state.mouthOpen, state.voiceVol);
            let mf = 0, det = "CLOSED", ms = state.isHappy ? (0.43 + state.smileDegree * 0.04) : 0.41;
            if (v >= state.thresA) { mf = 7; det = "A"; ms *= 0.82; }
            else if (v >= state.thresE) { mf = 1; det = "E"; }
            else if (v >= state.thresI) { mf = 4; det = "I"; }
            else if (v >= state.thresO) { mf = 6; det = "O"; }
            else if (v >= state.thresU) { mf = 6; det = "U"; ms *= 0.5; }
            else { mf = state.isHappy ? 3 : 0; det = "CLOSED"; }
            state.detectedVowel = det;
            drawPart(images.mouthUni, { y: state.mouthY, scaleX:ms, scaleY:ms, frame: mf, isMouth: true });

            const hud = document.querySelector('.hud');
            if (hud && v_data) {
                const total = Math.max(state.mouthOpen, state.voiceVol).toFixed(2);
                const check = (th) => total >= th ? '<span style="color:#00FF00">MATCH</span>' : `<span style="color:#555">WAIT(${(th).toFixed(2)})</span>`;
                hud.innerHTML = `UNIT: ARCADE_ANGEL ${v_data.current_version} (${v_data.last_updated})<br>` +
                              `<span style="color:#FFFF00">TOTAL INPUT: ${total}</span><br>` +
                              `A:${check(state.thresA)}|E:${check(state.thresE)}|I:${check(state.thresI)}<br>` +
                              `O:${check(state.thresO)}|U:${check(state.thresU)}<br>` +
                              `DET: <span style="color:#FF00FF">${state.detectedVowel}</span><br>` +
                              `SMILE: <span style="color:#FFAA00">${Math.round(state.smileDegree*100)}%</span> (RAW:${state.smileRaw.toFixed(2)}/SENS:${(state.smileSens/100).toFixed(2)})`;
            }
        }

        function animate() {
            state.curX += (state.tgtX - state.curX) * 0.1; state.curY += (state.tgtY - state.curY) * 0.1;
            state.curRot += (state.tgtRot - state.curRot) * 0.06; render(); requestAnimationFrame(animate);
        }

        (async function init() {
            try {
                const assets = await (await fetch('assets.json?v=' + Date.now())).json();
                v_data = await (await fetch('version_history_dev.json?v=' + Date.now())).json();
                const fm = new FaceMesh({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
                fm.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });
                fm.onResults((res) => {
                    if (res.multiFaceLandmarks && res.multiFaceLandmarks[0]) {
                        const lm = res.multiFaceLandmarks[0];
                        state.eyeL = Math.max(0, Math.min(1, (Math.abs(lm[386].y - lm[374].y) - 0.006) / 0.016));
                        state.eyeR = Math.max(0, Math.min(1, (Math.abs(lm[159].y - lm[145].y) - 0.006) / 0.016));
                        state.mouthOpen = Math.abs(lm[13].y - lm[14].y) * 5;
                        state.tgtX = (lm[1].x - 0.5) * 400; state.tgtY = (lm[1].y - 0.5) * 400;
                        state.tgtRot = Math.atan2(lm[152].x - lm[10].x, lm[152].y - lm[10].y) * -1;
                        const mouthWidth = Math.abs(lm[61].x - lm[291].x);
                        const eyeDist = Math.abs(lm[33].x - lm[263].x);
                        state.smileRaw = mouthWidth / eyeDist;
                        state.smileDegree = Math.max(0, Math.min(1, (state.smileRaw - (state.smileSens/100)) / 0.2));
                        if (state.autoSmile) state.isHappy = state.smileDegree > 0.3;
                    }
                });
                const cam = new Camera(document.getElementById('webcam'), { onFrame: async () => await fm.send({ image: document.getElementById('webcam') }), width: 640, height: 480 });
                cam.start();
                for (let k in assets) {
                    const i = new Image(); i.src = assets[k];
                    await new Promise(r => i.onload = r);
                    images[k] = await processAlpha(i, k === 'face' ? 'face' : 'part');
                }
                loadFromLocal();
                ['thresA','thresE','thresI','thresO','thresU','pivotY','smileSens'].forEach(k => {
                    const s = document.getElementById(k), n = document.getElementById(k + '_num');
                    if (s) s.oninput = (e) => syncUI(k, e.target.value);
                    if (n) n.oninput = (e) => syncUI(k, e.target.value);
                    const v = k.startsWith('thres') ? state[k]*100 : state[k];
                    if (s) s.value = v; if (n) n.value = v;
                });
                animate();
            } catch (e) { console.error(e); }
        })();
    </script>
</body>
</html>
